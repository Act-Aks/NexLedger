name: NexLedger Auto Version & Release

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Lint & Static Analysis ──
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Run lint
        run: ./gradlew lint --stacktrace

      - name: Run detekt
        continue-on-error: true
        run: ./gradlew detekt --stacktrace

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results*.html
            */build/reports/detekt/

  # ── Unit Tests ──
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: |
            */build/test-results/test*UnitTest/
            */build/reports/tests/test*UnitTest/

  # ── Version bump via Kotlin CLI ──
  version-bump:
    name: Conventional Version Bump
    runs-on: ubuntu-latest
    needs: [ lint, unit-tests ]
    if: startsWith(github.ref, 'refs/heads/main')

    outputs:
      tag_name: ${{ steps.version.outputs.tag_name }}
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Run conventional Android version bump
        id: version
        uses: ./.github/actions/conventional-android-version
        with:
          gradle_file: "app/build.gradle.kts"
          tag_prefix: "v"

      - name: Commit and push version bump + tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add app/build.gradle.kts
          git commit -m "chore(release): ${{ steps.version.outputs.new_version }}" \
            || echo "No changes to commit"

          TAG="${{ steps.version.outputs.tag_name }}"
          if [ -n "$TAG" ]; then
            git tag "$TAG" || echo "Tag $TAG already exists"
          fi

          git push origin HEAD:main --follow-tags
  # ── Build (Debug + Release) ──
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [ lint, unit-tests, version-bump ]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Create keystore file and keystore.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          mkdir -p app
          echo "$KEYSTORE_BASE64" | base64 -d > $KEYSTORE_PATH

          touch app/keystore.properties
          echo "storePassword=$KEYSTORE_STORE_PASSWORD" >> app/keystore.properties
          echo "keyAlias=$KEYSTORE_KEY_ALIAS" >> app/keystore.properties
          echo "keyPassword=$KEYSTORE_KEY_PASSWORD" >> app/keystore.properties

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

  # ── GitHub Release (using bumped tag) ──
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ build, version-bump ]
    steps:
      - name: Download release APK artifact
        uses: actions/download-artifact@v8
        with:
          name: release-apk
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # If Gradle produces app-release.apk, this is fine.
          # Otherwise, use a glob: "*.apk"
          files: "*.apk"
          tag_name: ${{ needs.version-bump.outputs.tag_name }}
          generate_release_notes: true
